<template>
    <div class="erp_mark7">
        <div class="spinner">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" variant="brand" size="large">
                </lightning-spinner>
            </template>
        </div>
        <div class="slds-page-header slds-hide">
            <div class="slds-media">
                <div class="slds-media__figure">
                    <span class="slds-icon_container slds-icon-standard-" title="">
                        <span class="slds-icon slds-page-header__icon" aria-hidden="true">
                            <!--<img src="/resource/PickPackShipResource/assets/images/cplogo.png" width="150 " height="35"

                        </span>
                    </span>
                </div>
                <div class="slds-media__body">
                    <h1 class="slds-page-header__title slds-truncate slds-align-middle" title=""></h1>
                    <p class="slds-text-body_small slds-line-height_reset"></p>
                </div>

                <!--<div class="slds-col slds-no-flex slds-grid slds-align-top slds-p-bottom_xx-small">
                    <button class="slds-button slds-button--neutral" >Back</button> 
                </div>-->
            </div>
        </div>
        <div class="row USPS-class2">
            <div class="col-xs-12 col-sm-12 col-md-6 slds-m-top--small">
                <div>
                    <div class="slds-page-header Message USPS-class3">
                        <section class="slds-clearfix">
                            <div class="slds-float--left">
                                <lightning-icon class="slds-show" icon-name={iconname} size="x-small"></lightning-icon>
                            </div>
                            <div class="slds-m-left--small">1. Where is this shipment going?
														
														<div class="float-right">
																<img src="/resource/ERP7__PickPackShipResource/assets/images/cplogo.png"/>
														  <!--<img src="/resource/PickPackShipResource/assets/images/cplogo.png" width="150 " height="35"/>-->
														</div>
														</div>
														
                        </section>
                    </div>
                    <div class="sectionOne">
                        <div class="epr_Mark7 USPS-class4">
                            <div class="row slds-grid slds-m-around--small USPS-class5">
                                <div class="col-md-4 col-xs-4">
                                    <div
                                        class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                        <template if:true={Toaddress}>
																						<div class="slds-grid">
                                                <label>To Address</label>&nbsp;
                                                <div class="required">*</div>
                                            </div>
																						<c-custom-input-lookup-l-w-c obj-name="ERP7__Address__c"
                                                search-placeholder="Search address" icon-name="standard:address"
                                                is-value-selected={toAddressSelected} selected-value={Toaddress.Id}
                                                selected-name={Toaddress.Name} selected-name-url={toAddressUrl}
                                                hide-remove="true"> </c-custom-input-lookup-l-w-c>
                                           <!-- <c-custom-input-lookup-l-w-c class="toaddress" obj-name="ERP7__Address__c"
                                                icon-name="standard:address" label-name="To address"
                                                placeholder="Search" fields='Name' display-fields='Name'
                                                value-id={Toaddress.Id} onlookup={toaddressHandler}>
                                            </c-custom-input-lookup-l-w-c>-->
                                        </template>

                                    </div>
                                </div>
                                <template if:true={Toaddress}>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label"> Company :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Contact__r.ERP7__Company__c}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Contact :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Contact__r.Name}></lightning-input>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <template if:true={Toaddress}>
                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Email :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Contact__r.Email}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Phone :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Contact__r.Phone}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Address Line 1 :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Address_Line1__c}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Address Line 2 :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Address_Line2__c}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">City/Town :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__City__c}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">State/County :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__State__c}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Zip/Post code :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Postal_Code__c} onchange={handlepostalChangeTo}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label"> Country :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={Toaddress.ERP7__Country__c} onchange={handleCountryChange}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <template if:true={fromAddress}>
                        <div class="slds-page-header Message USPS-class3">
                            <section class="slds-clearfix">
                                <div class="slds-float--left">
                                    <lightning-icon class="slds-show" icon-name={iconname} size="x-small">
                                    </lightning-icon>
                                </div>
                                <div class="slds-m-left--small">2. Where is this shipment coming from?</div>
                            </section>
                        </div>
                        <div class="sectionTwo">
                            <div class="epr_Mark7 USPS-class4">
                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
																						 <div class="slds-grid">
                                                <label>From Address</label>&nbsp;
                                                <div class="required">*</div>
                                            </div>
																						<c-custom-input-lookup-l-w-c obj-name="ERP7__Address__c"
                                                search-placeholder="Search address" icon-name="standard:address"
                                                is-value-selected={fromAddressSelected} selected-value={fromAddress.Id}
                                                selected-name={fromAddress.Name} selected-name-url={fromAddressUrl}
                                                hide-remove="true"> </c-custom-input-lookup-l-w-c>
                                            <!--<c-custom-input-lookup-l-w-c class="fromAddress" obj-name="ERP7__Address__c"
                                                icon-name="standard:address" label-name="From address"
                                                placeholder="Search" fields='Name' display-fields='Name'
                                                value-id={fromAddress.Id} onlookup={fromAddressHandler}>
                                            </c-custom-input-lookup-l-w-c>-->

                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label"> Company :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Contact__r.ERP7__Company__c}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Contact :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Contact__r.Name}></lightning-input>
                                        </div>
                                    </div>
                                </div>

                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Email :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Contact__r.Email}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Phone :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Contact__r.Phone}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Address Line 1 :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Address_Line1__c}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Address Line 2 :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Address_Line2__c}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">City/Town :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__City__c}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">State/County :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__State__c}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                                <div class="row slds-grid slds-m-around--small USPS-class5">
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label">Zip/Post code :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Postal_Code__c} onchange={handlepostalChange}></lightning-input>
                                        </div>
                                    </div>
                                    <div class="col-md-4 col-xs-4">
                                        <div
                                            class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                            <label class="slds-form-element__label"> Country :</label>
                                            <lightning-input type="text" variant="label-hidden"
                                                value={fromAddress.ERP7__Country__c}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                    <div>
                        <div class="slds-page-header Message USPS-class3">
                            <section class="slds-clearfix">
                                <div class="slds-float--left ">
                                    <lightning-icon class="slds-show" icon-name={iconname} size="x-small">
                                    </lightning-icon>
                                </div>
                                <div class="slds-m-left--small">3. What are you shipping?</div>
                            </section>
                        </div>

                        <div class="sectionThree">
                            <table class="slds-table slds-table--bordered slds-table--cell-buffer">
                                <thead>
                                    <tr class="slds-text-title--caps">
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Package">Package</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Order">Order</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Weight">Weight</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Length">Length</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Width">Width</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Height">Height</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate2" title="Declared Value">Declared Value</div>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template if:true={packages} for:each={packages} for:item="row" for:index="index">

                                        <tr class="slds-hint-parent" key={row.Id}>
                                            <td class="greyheadlabel">
                                                 <lightning-formatted-url label={row.Name} value={row.packUrl} target="_blank"></lightning-formatted-url>
                                               <!-- <lightning-formatted-text value={row.Name}></lightning-formatted-text>-->
                                            </td>
                                            <td class="greyheadlabel">
                                                <template if:true={row.ERP7__Transfer_Order__c}>
                                                    <lightning-formatted-text
                                                        value={row.ERP7__Transfer_Order__r.name} target="_blank">
                                                    </lightning-formatted-text>
                                                   <!-- <lightning-formatted-url
                                                        label={row.ERP7__Transfer_Order__r.Name}
                                                        value={row.ERP7__Transfer_Order__c} target="_blank">
                                                    </lightning-formatted-url>-->
                                                </template>
                                                <template if:true={row.ERP7__Order__c}>
                                                     <lightning-formatted-text
                                                        value={row.ERP7__Order__r.OrderNumber} target="_blank">
                                                    </lightning-formatted-text>
                                                   <!-- <lightning-formatted-url label={row.ERP7__Order__r.Name}
                                                        value={row.ERP7__Order__c} target="_blank">
                                                    </lightning-formatted-url>-->
                                                </template>
                                            </td>
                                            <td class="greyheadlabel">
                                                {row.ERP7__Weight__c}
                                            </td>
                                            <td class="greyheadlabel">
                                                {row.ERP7__Length__c}
                                            </td>
                                            <td class="greyheadlabel">
                                                {row.ERP7__Width__c}
                                            </td>
                                            <td class="greyheadlabel">
                                                {row.ERP7__Height__c}
                                            </td>
                                            <td class="greyheadlabel">
                                                <lightning-input type="number" formatter="currency" step="0.01"
                                                    variant="label-hidden" value={row.ERP7__Declared_Value__c}
                                                    oncommit={setDeclaredval} data-record-id={row.Id}></lightning-input>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12 col-sm-12 col-md-6 slds-m-top--small">
                <div class="slds-tabs--default slds-p-around--xx-small">
                    <lightning-tabset>
                        <lightning-tab label="SHIPPING SERVICES / COST" icon-name={shippingIcon} title="SHIPPING SERVICES / COST">
                            <div class="row slds-grid slds-m-around--small USPS-class5">
                                <div class="col-md-4 col-xs-4">
                                    <div
                                        class="slds-form-element__control slds-input-has-icon slds-input-has-icon--right">
                                        <lightning-input type="date" label="Shipment Date"
                                            class="display-lable" value={shipment.ERP7__Shipment_Date__c}
                                            onchange={setshipmentdate}></lightning-input>
                                    </div>
                                </div>
                               <!-- <div class="col-md-4 col-xs-4">
																		<div class="maq">
																				<lightning-combobox name="Service" label="Parcel Service"  value={serviceVal}
																														placeholder="Select Services" options={serviceOptions}
																														onchange={handleServiceChange}>
																				</lightning-combobox>
																		</div>
                                   
                                </div>-->
                            </div>

                            <div class="row slds-grid slds-m-around--small USPS-class5">
                                <div if:true={ShowGetRate}
                                    class="col-xs-12 col-sm-12 col-md-12 USPS-class10 text-center">
                                   <!-- <lightning-button variant="brand" onclick={Rate_Request} label="Get Rates">
                                    </lightning-button>-->
                                    <button type="button" variant="brand" onclick={Rate_Request} class="slds-button slds-button_brand">
																				Get Rates
																		</button>
                                </div>
                            </div>

                            <div if:true={errorMsg} class="redcolor">
                                <div class="row">
                                    <div class="col-sm-12 slds-m-top--small slds-m-bottom--small USPS-class9">
                                        {errorMsg}
                                    </div>
                                </div>
                            </div>

                            <div if:true={errorMsg1} class="redcolor">
                                <div class="row">
                                    <div class="col-sm-12 slds-m-top--small slds-m-bottom--small USPS-class9">
                                        {errorMsg1}
                                    </div>
                                </div>
                            </div>

                            <div if:true={WrapperMsg} class="textmsg">
                                <div class="row">
                                    <div class="col-sm-12 slds-m-top--small slds-m-bottom--small USPS-class9">
                                        {WrapperMsg}
                                    </div>
                                </div>
                            </div>

                            <div if:true={ShowTimeInCostTab}>
                                <div class="textmsg">
                                    Available Services For The Selected Location
                                </div>
                                <div class="row">
                                    <table
                                        class="slds-table slds-table--bordered slds-table--cell-buffer col-sm-12 slds-m-top--small">
                                        <thead>
                                            <tr class="slds-text-title--caps">
																								
                                                <th scope="col">
                                                    <div class="slds-truncate" title="Select">Select</div>
                                                </th>
																								 <th scope="col">
                                                    <div class="slds-truncate" title="Service Type">Service Name</div>
                                                </th>
                                                <th scope="col">
                                                    <div class="slds-truncate" title="Service Type">Service Code</div>
                                                </th>
                                                <th scope="col">
                                                    <div class="slds-truncate" title="Total Charges">Total Charges</div>
                                                </th>
                                                <th scope="col">
                                                    <div class="slds-truncate" title="Commitment Date">Delivery Date
                                                    </div>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template if:true={CP_Services} for:each={CP_Services}
                                                for:item="row" for:index="index"><!--for:each={CP_Services.Services}-->
                                                <tr key={row.Service}>
                                                    <th scope="row" data-label="Select">
                                                        <div class="slds-form-element__control USPS-class12">
                                                            <lightning-input type="radio" variant="label-hidden"
                                                                name="others" value={row.Selected}
                                                                onchange={getSelectedService} data-record-id={index}>
                                                            </lightning-input>
                                                        </div>
                                                    </th>
																										<td data-label="Service Name">
                                                        <div class="slds-truncate" title="Service name">
                                                            <lightning-formatted-rich-text value={row.serviceName}>
                                                            </lightning-formatted-rich-text>
                                                        </div>
                                                    </td>
                                                    <td data-label="Service Code">
                                                        <div class="slds-truncate" title="Service">
                                                            <lightning-formatted-rich-text value={row.serviceCode}><!--value={row.Service}-->
                                                            </lightning-formatted-rich-text>
                                                        </div>
                                                    </td>
                                                    <td data-label="Total Charges">
                                                        <div class="slds-truncate" title="Total Charges"><!--value={row.totalSurcharges} title={row.totalSurcharges}-->
                                                            <lightning-formatted-text value={row.dueAmount}
                                                                title={row.dueAmount}></lightning-formatted-text>
                                                            <!--CAD-->
                                                        </div>
                                                    </td>
                                                    <td data-label="Delivery Date">
                                                        <div class="slds-truncate" title="Delivery Date">
                                                            <div if:true={row.deliveryDate}>
                                                                <lightning-formatted-text value={row.deliveryDate}
                                                                    title={row.deliveryDate}></lightning-formatted-text>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
