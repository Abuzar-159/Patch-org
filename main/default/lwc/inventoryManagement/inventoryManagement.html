<template>
  <div class="erp_mark7" style="background:#F7F8F9;min-height: 81vh;">
      <div class="spinner">
          <template if:true={isLoading}>
              <lightning-spinner alternative-text="Loading" variant="brand" size="large">
              </lightning-spinner>
          </template>
      </div>
      <div class="slds-page-header">
          <div class="slds-page-header__row">
              <div class="slds-page-header__col-title">
                  <div class="slds-media">
                      <template if:true={showTab1}>
                          <div class="slds-media__figure">
                              <span class="slds-icon_container slds-icon-standard-opportunity">

                                  <lightning-icon icon-name="standard:bundle_config"
                                      title="Material Requirement Planning(MRP)" size="medium"></lightning-icon>
                              </span>
                          </div>
                      </template>
                      <template if:true={showTab2}>
                          <div class="slds-media__figure">
                              <span class="slds-icon_container slds-icon-standard-opportunity">

                                  <lightning-icon icon-name="standard:bundle_config"
                                      title="Material Requirement Planning(MRP)" size="medium"></lightning-icon>
                              </span>
                          </div>
                      </template>
                      <template if:true={showTab3}>
                          <div class="slds-media__figure">
                              <span class="slds-icon_container slds-icon-standard-opportunity">

                                  <lightning-icon icon-name="standard:snippet_alt" title="Forecasting"
                                      size="medium"></lightning-icon>
                              </span>
                          </div>
                      </template>
                      <template if:true={showMRPCreationPage}>
                          <div class="slds-media__figure">
                              <span class="slds-icon_container slds-icon-standard-opportunity">
                                  <lightning-icon icon-name="standard:asset_action" title="Create"
                                      size="medium"></lightning-icon>
                              </span>
                          </div>
                      </template>
                      <template if:true={showProductsList}>
                          <div class="slds-media__figure">
                              <span class="slds-icon_container slds-icon-standard-opportunity">
                                  <lightning-icon icon-name="standard:asset_object" title="Add Products"
                                      size="medium"></lightning-icon>
                              </span>
                          </div>
                      </template>
                      <template if:true={createReorderModal}>
                          <div class="slds-media__figure">
                              <span class="slds-icon_container slds-icon-standard-opportunity">
                                  <lightning-icon icon-name="standard:asset_object" title="Create Reordering Rules"
                                      size="medium"></lightning-icon>
                              </span>
                          </div>
                      </template>
                      <div class="slds-media__body">
                          <div class="slds-page-header__name">
                              <div class="slds-page-header__name-title">
                                  <h1>

                                      <span class="slds-page-header__title slds-truncate" title="">
                                          <template lwc:if={showTab1}>
                                              Material Requirement Planning(MRP)
                                          </template>
                                          <template lwc:elseif={showTab2}>
                                              Materials Stock Traceabilityy
                                          </template>
                                          <template lwc:elseif={showTab3}>
                                              Forecasting
                                          </template>
                                          <template lwc:elseif={showMRPCreationPage}>
                                              <span>CREATE</span>
                                              <span class="slds-page-header__title slds-truncate"
                                                  title="Material Requirement Planning(MRP)">
                                                  Material Requirement Planning(MRP)
                                              </span>
                                          </template>
                                          <template lwc:elseif={showProductsList}>
                                              Add Products
                                          </template>
                                          <template lwc:elseif={createReorderModal}>
                                              Create Reordering Rules
                                          </template>
                                      </span>
                                  </h1>
                              </div>
                              <div class="slds-page-header__name-switcher">

                              </div>
                          </div>
                      </div>
                      <div class="slds-page-header__control slds-p-right_small">
                          <template lwc:if={showTab1}>

                              <ul class="slds-button-group-list">
                                  <li class="slds-m-right_xx-small">
                                      <lightning-button label="New" variant="brand-outline" title="Create MRP"
                                          onclick={displayMRPCreationPage} icon-name="utility:add"
                                          icon-position="left"></lightning-button>
                                      <!--<lightning-button label="Forecast" variant="brand-outline" title="Forecast based on sales or production or supply" onclick={displayForecast} icon-name="utility:add" icon-position="left"></lightning-button> -->

                                  </li>
                                  <li class="slds-m-right_xx-small">
                                      <c-custom-input-lookup-l-w-c obj-name="ERP7__Material_Requirement_Planning__c"
                                          class="MRP" search-placeholder="Search MRP" icon-name="custom:custom32"
                                          onlookupselected={onMRPChange} selected-value={MRP.Id}
                                          selected-name={MRP.Name} selected-name-url={mrpUrl}
                                          filter="ERP7__Simulate__c = false" is-value-selected={mrpSelected}>
                                      </c-custom-input-lookup-l-w-c>


                                  </li>
                                  <li>
                                      <lightning-button label="Stock Take" variant="brand-outline"
                                          title="Inventory audit" onclick={goToStockTake} icon-name="standard:orders"
                                          icon-position="left"></lightning-button>
                                  </li>
                                  <li>
                                      <lightning-button label="Stock Transfer" variant="brand-outline"
                                          title="Transfer your stock internally" onclick={goToStockTransfer}
                                          icon-name="utility:product_transfer"
                                          icon-position="left"></lightning-button>
                                  </li>
                              </ul>
                          </template>
                      </div>
                  </div>
              </div>
          </div>
      </div>
      <template lwc:if={showTab1}>
          <div class="erp_Mark7 maqsood">

              <div class="slds-grid slds-wrap slds-p-left_small slds-p-top_x-small">
                  <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small ">
                      <lightning-input type="search" oncommit={handleKeyChange}
                          class="slds-m-bottom_small fontweight600" placeholder="Product Name/Code.." label="Search"
                          max-length="80"></lightning-input>

                  </div>
                  <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small ">
                      <lightning-combobox class='no-input-lable fontweight600' value={family}
                          placeholder="Select Family..." options={familylt} label="Select Family"
                          onchange={handleFamilyChange}></lightning-combobox>
                  </div>
                  <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small ">
                      <lightning-combobox class='no-input-lable fontweight600' value={subFamily}
                          placeholder="Select Sub Family..." label="Select Sub Family" options={subFamilylst}
                          onchange={handleSubFamilyChange}></lightning-combobox>
                  </div>
                  <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small">
                      <label class="slds-form-element__label slds-no-flex" for="input-113" part="label">Search
                          Site</label>
                      <c-custom-input-lookup-l-w-c obj-name="ERP7__Site__c" class="site fontweight600"
                          search-placeholder="Search Site" icon-name="custom:custom32" onlookupselected={onSiteSel}
                          onremove={removeSelectedSite} selected-value={site.Id} selected-name={site.Name}
                          selected-name-url={siteUrl} is-value-selected={siteSelected}> </c-custom-input-lookup-l-w-c>
                  </div>
                  <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small ">

                      <lightning-input type="date" onchange={getfromDateInventory} label="From" class="fontweight600"
                          value={fromtab1Date}></lightning-input>
                  </div>
                  <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small ">

                      <lightning-input type="date" onchange={getToDateInventory} label="To" class="fontweight600"
                          value={toTab2Date}></lightning-input>
                  </div>
                 <!-- <div
                      class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-large-size_2-of-12 slds-p-right_small ">

                       <lightning-combobox class='no-input-lable fontweight600' value={selectedfilter}
                          placeholder="Select Filter..." label="Apply Filter" options={filterOptions}
                          onchange={handleFilterChange}></lightning-combobox>
                  </div>-->


              </div>
              <div class="card shadow-sm m-2">
                  <div class="card-body p-2">
                      <div class="table-responsive p-bottom3" style="height:60vh">
                          <table class="slds-table slds-table_cell-buffer slds-table_bordered " id="Selected-row">
                              <thead>
                                  <tr class="slds-text-title_caps">
                                      <th scope="col" class="slds-truncate">Sl.</th>
                                      <th scope="col" class="slds-truncate">
                                          Product code&nbsp;
                                          <lightning-helptext content="Code assigned to the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Name &nbsp;
                                          <lightning-helptext content=" Descriptive name of the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Vendor(Price) &nbsp;
                                          <lightning-helptext content="Supplier providing the part wih Cost"
                                              class="line-heightim"></lightning-helptext>
                                      </th>

                                      <th scope="col" class="slds-truncate">
                                          Awaiting Qty&nbsp;
                                          <lightning-helptext
                                              content="Quantity of the part that are awaiting to be received or in Manufacturing"
                                              class="line-heightim"></lightning-helptext>

                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          On hand&nbsp;
                                          <lightning-helptext content="Current stock level of the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Reserved(SO)&nbsp;
                                          <lightning-helptext
                                              content="Quantity of the part reserved for Sales Orders (SO)"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Issued/WIP &nbsp;
                                          <lightning-helptext
                                              content="Quantity of the part issued or allocated to Manufacturing Orders (MO)"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          QC hold&nbsp;
                                          <lightning-helptext
                                              content="Quantity of the part currently in Quality Control (QC) "
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Open Pos&nbsp;
                                          <lightning-helptext content="Open POs for the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Open Mos&nbsp;
                                          <lightning-helptext content="Open MOs for the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          IC transfer&nbsp;
                                          <lightning-helptext content="Inter-Company Transfer"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Demand (Sales)&nbsp;
                                          <lightning-helptext content="Demand Sales"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Demand (MO)&nbsp;
                                          <lightning-helptext content="Demand MO"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <!--<th scope="col">Indirect Demand&nbsp;</th>-->
                                      <th scope="col" class="slds-truncate">
                                          Available to Promise&nbsp;
                                          <lightning-helptext
                                              content="Net available quantity, considering stock, orders, reservations, holds and Demands"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Min Qty&nbsp;
                                          <lightning-helptext content="Minimum stock level desired for the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          Max Qty
                                          <lightning-helptext content="Maximum stock level desired for the part"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <th scope="col" class="slds-truncate">
                                          To Supply/Produce&nbsp;
                                          <lightning-helptext
                                              content="Quantity needs to be ordered/Manufactured based on demand and stock levels"
                                              class="line-heightim"></lightning-helptext>
                                      </th>
                                      <!--<th>

                                      </th>-->

                                  </tr>
                              </thead>
                              <tbody>
                                  <template if:true={showInventorylist}>
                                      <template for:each={Inventorylist} for:item="row" for:index="ind">

                                          <tr key={row.prod.Id}>
                                              <td>
                                                  <div class="slds-truncate">
                                                      {row.index}
                                                  </div>
                                              </td>
                                              <td>
                                                  <div class="slds-truncate"
                                                      style=" max-width: 140px;white-space: normal;">
                                                      {row.prod.ProductCode}

                                                  </div>
                                              </td>
                                              <td>
                                                  <div class="slds-truncate" style="width: 300px;white-space:normal;">
                                                      <lightning-formatted-text value={row.prod.Name}
                                                          onclick={NavToRecord} title={row.prod.Name} id={row.prod.Id}
                                                          linkify class="blue"></lightning-formatted-text>
                                                  </div>

                                              </td>
                                              <td>
                                                  <div if:true={row.approvedVendors} class="slds-truncate"
                                                      style="max-width: 140px;white-space:normal;">
                                                      <template for:each={row.approvedVendors} for:item="app">
                                                          <div if:true={app} key={app.Id}>
                                                          <span if:true={app.ERP7__Vendor__c}>
                                                              {app.ERP7__Vendor__r.Name}
                                                          </span>
                                                          <span if:true={app.ERP7__Cost_Card__c}>
                                                          &nbsp;({app.ERP7__Cost_Card__r.ERP7__Cost__c})<br/>
                                                          </span>
                                                          </div>
                                                      </template>
                                                  </div>
                                              </td>

                                              <td class="slds-truncate">
                                                  <span class="padding-top1"><!--awaitingqty-->
                                                      {row.orderedQty}
                                                  </span>
                                              </td>
                                              <td class="slds-truncate">
                                                  <span class="padding-top1"><!--onhandqty-->
                                                      {row.onHand}
                                                  </span>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.reservedSO}>
                                                      <div class="grey-windowIM" >
                                                          <!--reservedsoqty-->
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                  {row.reservedSO}
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}
                                                          data-id={row.prod.Id}
                                                          data-index='Reserved SO'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </div>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.reservedMO}>
                                                      <span class="grey-windowIM padding-top1" ><!--issuedqty-->

                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                  {row.reservedMO}
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}
                                                          data-id={row.prod.Id}
                                                          data-index='Reserved MO'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.QC}>
                                                      <span class="grey-windowIM padding-top1" > <!--qcholdqty-->
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                  {row.QC}
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}
                                                          data-id={row.prod.Id} data-index='QC Hold'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.openPos}>
                                                      <span class="grey-windowIM padding-top1"
                                                          >
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                   {row.openPos}({row.openPosCount})
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick} data-id={row.prod.Id} data-index='Open POs'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.openMos}>
                                                      <span class="grey-windowIM padding-top1"
                                                         >
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                   {row.openMos}({row.openMosCount})
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}  data-id={row.prod.Id} data-index='Open MOs'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.icTransfer}>
                                                      <span class="grey-windowIM padding-top1" >
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                  {row.icTransfer}
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}
                                                          data-id={row.prod.Id} data-index='IC Transfer'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.demandSales}>
                                                      <span class="grey-windowIM padding-top1" >
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                  {row.demandSales}({row.demandSalesCount})
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}
                                                          data-id={row.prod.Id} data-index='Demand SO'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <td class="slds-truncate">
                                                  <div lwc:if={row.demandMO}>
                                                      <span class="grey-windowIM padding-top1" >
                                                          <div class="slds-grid">
                                                              <div class="slds-col padding-top1">
                                                                   {row.demandMO}({row.demandMOCount})
                                                              </div>
                                                              <div class="slds-col">
                                                                  <lightning-icon icon-name="utility:new_window" size="xx-small" onclick={handleReservedClick}
                                                          data-id={row.prod.Id} data-index='Demand MO'></lightning-icon>
                                                              </div>
                                                          </div>

                                                      </span>
                                                  </div>
                                                  <div lwc:else class="padding-top1">
                                                      0
                                                  </div>
                                              </td>
                                              <!--<td>{row.indirectDemand}</td>-->
                                              <td class="slds-truncate padding-top1">{row.netQty}</td>
                                              <td class="slds-truncate padding-top1">{row.minQty}</td>
                                              <td class="slds-truncate padding-top1">{row.maxQty}</td>
                                              <td class=""><!--slds-truncate-->
                                                  <div class="slds-grid slds-wrap">
                                                      <div class="slds-col slds-size_1-of-2 slds-large-size_9-of-12 slds-p-right_xxx-small slds-p-top_xxx-small slds-truncate"
                                                          style="white-space:normal">
                                                          <span class="padding-top1">{row.suggestedQty} </span>
                                                      </div>
                                                      <div class="slds-col slds-size_1-of-2 slds-large-size_2-of-12">

                                                          <lightning-button-menu alternative-text="Show menu"
                                                              onselect={changeHandler} data-id={row.prod.Id} data-index={row.suggestedQty}
                                                              data-name={row.prod.Name} variant="inverse"
                                                              size="x-small" menu-alignment="right">
                                                              <div if:true={row.prod.ERP7__Issue_Purchase_Order__c}>
                                                                  <lightning-menu-item value="Create Purchase Order"
                                                                      label="Create Purchase Order"></lightning-menu-item>
                                                              </div>
                                                              <div
                                                                  if:true={row.prod.ERP7__Issue_Manufacturing_Order__c}>
                                                                  <lightning-menu-item
                                                                      value="Create Manufacturing Order"
                                                                      label="Create Manufacturing Order"></lightning-menu-item>
                                                              </div>
                                                              <lightning-menu-item value="Create Transfer Order"
                                                                  label="Create Transfer Order"></lightning-menu-item>
                                                              <lightning-menu-item value="Stock Take"
                                                                  label="Stock Take"></lightning-menu-item>
                                                              <lightning-menu-item value="Stock Transfer"
                                                                  label="Stock Transfer"></lightning-menu-item>
                                                              <lightning-menu-item value="History Tracking"
                                                                  label="History Tracking"></lightning-menu-item>
                                                              <div
                                                                  if:true={row.prod.ERP7__Issue_Manufacturing_Order__c}>
                                                                  <lightning-menu-item value="View BOM Details"
                                                                      label="View BOM Details"></lightning-menu-item>
                                                              </div>
                                                              <!--<lightning-menu-item value="Forecast"
                                                                  label="Forecast"></lightning-menu-item>-->

                                                          </lightning-button-menu>

                                                      </div>
                                                  </div>

                                              </td>

                                          </tr>
                                      </template>
                                  </template>
                                  <template if:false={showInventorylist}>
                                      <tr>
                                          <td style="z-index:9" colspan="10" class="warning-message">No Products to
                                              Display</td>
                                      </tr>
                                  </template>
                              </tbody>
                          </table>
                      </div>

                  </div>

              </div>
          </div>
          <template if:true={showModaltab1}>
              <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-02"
