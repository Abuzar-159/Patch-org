<template>
    <template if:true={spinner}>
        <lightning-spinner variant="brand" size="large" alternative-text="Please wait while loading..."></lightning-spinner>        
    </template>
    <div class="slds-grid">
        <div class="slds-col">
            <div class="container-fluid">
                <div class="slds-grid slds-wrap slds-m-top--xx-small" >  
                    <div class="col-md-12 col-sm-12 col-xs-12">
                        <div class="slds-form-element">
                            <div class="slds-form-element__control">
                                <template if:true={errorMsg}>
                                    <div class="required">{errorMsg}</div>
                                </template>
                            </div>
                        </div>
                    </div>                                                                                                                                              
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">{labels.Company}</label>
                            <div class="slds-form-element__control">
                                <lightning-input variant="label-hidden" value={order.Account.ERP7__Company__c} oncommit={handleAccComp}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">Website</label>
                            <div class="slds-form-element__control">
                                <lightning-input variant="label-hidden" value={order.Account.Website} oncommit={handleAccURL}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">{labels.Phone}</label>
                            <div class="slds-form-element__control">
                                <lightning-input type="number" variant="label-hidden" value={order.Account.Phone} oncommit={handleAccPhone}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">Fax</label>
                            <div class="slds-form-element__control">
                                <lightning-input variant="label-hidden" value={order.Account.Fax} oncommit={handleAccFax}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">{labels.Account}&nbsp;{labels.Profile}</label>
                            <div class="slds-form-element__control">
                                <c-custom-input-lookup-l-w-c obj-name="ERP7__Profiling__c" search-placeholder={labels.Search} icon-name="standard:client" onremove={removeAccProfile} onlookupselected={selectAccProfile}  is-value-selected={accProfileSelected} filter={accProfileFilter} selected-value={order.Account.ERP7__Account_Profile__c} selected-name={order.Account.ERP7__Account_Profile__r.Name} selected-name-url={accProfileUrl}> </c-custom-input-lookup-l-w-c>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">{labels.AccountNumber}</label>
                            <div class="slds-form-element__control">
                                <lightning-input variant="label-hidden" value={order.Account.AccountNumber} oncommit={handleAccNo}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-sm-6 col-xs-12">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label">{labels.VAT_Registration_No}</label>
                            <div class="slds-form-element__control">
                                <lightning-input variant="label-hidden" value={order.Account.ERP7__VAT_registration_number__c} oncommit={handleTaxReg}></lightning-input>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-12 col-sm-12 col-xs-12 pt-2">
                        <div class="slds-form-element">
                            <template if:true={showUpdateAccInfo}>
                                <lightning-button label={labels.Update} icon-name="utility:contract_doc" variant="brand" onclick={updateAccountInfo}></lightning-button><!--label="Update Account Info"-->
                            </template>                            
                        </div>
                    </div>
                </div>
            </div>
          </div>
          <div class="slds-col pr-2 pt-2">
            <button  title={labels.Create_Account} class="btn btn-lighten-info waves-effect  width-md waves-info slds-m-left_x-small mb-1 text-left" onclick={openCreateNewAccModal}><i class="mdi mdi-account-plus mr-2"></i>{labels.Account}</button>
            <button  title={labels.Create_Contact}  class="btn btn-lighten-danger  width-md waves-info slds-m-left_x-small mb-1 text-left" onclick={openCreateNewConModal}><i class="mdi mdi-contacts mr-2"></i>{labels.Contact}</button>
            <button title={labels.Create_Address}  class="btn btn-lighten-success waves-effect  width-md waves-info  slds-m-left_x-small text-left" onclick={openCreateNewAddModal}><i class="fas fa-address-book mr-2"></i>{labels.Address}</button>
            <!--<lightning-button label="Account" title="Create New Account" icon-name="utility:add" class="slds-m-left_x-small" onclick={openCreateNewAccModal}></lightning-button>
            <lightning-button label="Contact" title="Create New Contact" icon-name="utility:add" class="slds-m-left_x-small" onclick={openCreateNewConModal}></lightning-button>
            <lightning-button label="Address" title="Create New Address" icon-name="utility:add" class="slds-m-left_x-small" onclick={openCreateNewAddModal}></lightning-button>-->
          </div>
    </div>
    <template if:true={isCreateNewAccount}>

                            <div class="col-md-3 col-sm-3 col-xs-12">

                                    </div>
                                </div>
                            </div>

                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">Email</label><br/>
                                    <div class="slds-form-element__control">
                                        <lightning-input type="email" variant="label-hidden" value={accToInsert.ERP7__Email__c} oncommit={handleNewAccEmail}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">{labels.Phone}</label><br/>
                                    <div class="slds-form-element__control">
                                        <lightning-input type="number" variant="label-hidden" value={accToInsert.Phone} oncommit={handleNewAccPhone}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">Fax</label><br/>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={accToInsert.Fax} oncommit={handleNewAccFax}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">{labels.Company}</label><br/>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={accToInsert.ERP7__Company__c} oncommit={handleNewAccCompany}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">Website</label><br/>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={accToInsert.Website} oncommit={handleNewAccWebsite}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">{labels.VAT_Registration_No}</label><br/>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={accToInsert.ERP7__VAT_registration_number__c} oncommit={handleNewAccVAT}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">{labels.Description}</label><br/>
                                    <div class="slds-form-element__control">
                                        <div class="slds-form-element__control">
                                            <lightning-textarea value={accToInsert.Description} onblur={handleNewAccDes} variant="label-hidden"></lightning-textarea>                                            
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label" for="name">{labels.Is_Person_Account}</label><br/>
                                    <div class="slds-form-element__control">
                                        <div class="slds-form-element__control">
                                            <lightning-input type="checkbox" variant="label-hidden" checked={accToInsert.ERP7__Is_Person_Account__c} onchange={handleNewAccIsPer}></lightning-input>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                        
                    </div>
                </div>
                <footer class="slds-modal__footer text-center">
                    <lightning-button label={labels.Cancel} variant="neutral" onclick={closeCreateNewAccModal} class="mr-2"></lightning-button>
                    <lightning-button label={labels.Create_Account} variant="brand" onclick={newAccountSave} disabled={disableCreateAcc}></lightning-button>
                </footer>
            </div>
        </section>
				<div class="slds-backdrop slds-backdrop_open"></div>
    </template>

                                    </div>
                                </div>
                            </div>                            
                            <div class="col-md-3 col-sm-3 col-xs-12">

            </div>
        </section>
				<div class="slds-backdrop slds-backdrop_open"></div>

    <template if:true={isCreateNewAddress}>
