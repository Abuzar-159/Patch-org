<template>
    <template if:true={spinner}>
        <lightning-spinner variant="brand" size="large" alternative-text="Please wait while loading..."></lightning-spinner>        
    </template>
    <div if:true={errorList} class="yourDiv">
        <template for:each={errorList} for:item="error" for:index='ind'>
            <li key={error}>
                {error}
            </li>
        </template>
    </div>
    <div class="slds-grid slds-wrap">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12">   
            <div class="row">
                <div class="col-xl-3 col-md-6">
                    <div class="card-box widget-user border-blue shadow-sm mb-2 p-2">
                        <div class="text-center">
                            <h2 class="font-weight-normal text-primary" data-plugin="counterup"><lightning-formatted-number format-style="currency" value={order.ERP7__Order_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number></h2>
                            <h5><strong>{labels.Order}&nbsp;{labels.Amount}</strong></h5>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card-box widget-user border-pink shadow-sm mb-2 p-2">
                        <div class="text-center">
                            <h2 class="font-weight-normal text-pink" data-plugin="counterup"><lightning-formatted-number format-style="currency" value={order.ERP7__Amount_Paid__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number></h2>
                            <h5><strong>{labels.Paid}</strong></h5>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card-box widget-user border-warning shadow-sm mb-2 p-2">
                        <div class="text-center">
                            <h2 class="font-weight-normal text-warning" data-plugin="counterup">
                                <lightning-formatted-number format-style="currency" value={order.ERP7__Due_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number> 
                            </h2>
                            <h5><strong>{labels.Total_Due}</strong></h5>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card-box widget-user border-info shadow-sm mb-2 p-2">
                        <div class="text-center">
                            <h2 class="font-weight-normal text-info" data-plugin="counterup">
                                <lightning-formatted-number format-style="currency" value={order.Account.ERP7__Available_Credit_Balance__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                            </h2>
                            <h5><strong>{labels.Credit}</strong></h5>
                        </div>
                    </div>
                </div>
            </div>                                         
                
        </div>
				<div class="slds-grid slds-wrap" style="width:100%;">
						<div class="slds-col slds-size_1-of-1 slds-medium-size_9-of-12 slds-large-size_9-of-12">
							
                   
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th width="20%">{labels.Invoice_Name}</th>
                                        <th width="20%">{labels.Type}</th>
                                        <th width="20%">{labels.Total_Amount}</th>
                                        <th width="20%">{labels.Due_Amount}</th>
                                        <th width="20%">{labels.Action}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template if:true={invoiceList} for:each={invoiceList} for:item="inv" for:index="index">
                                        <tr key={inv.Id}>
                                            <td>
                                                <lightning-formatted-url value={inv.invoiceurl} label={inv.Name} target="_blank"></lightning-formatted-url> 
                                            </td>
                                            <td>
                                                <lightning-formatted-text value={inv.RecordType.DeveloperName}></lightning-formatted-text>
                                            </td>
                                            <td>
                                                <lightning-formatted-number format-style="currency" value={inv.ERP7__Invoice_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                            </td>
                                            <td>
                                                <lightning-formatted-number format-style="currency" value={inv.ERP7__Total_Due__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                            </td>
                                            <td>
                                                <!--<lightning-icon icon-name="custom:custom18" alternative-text="Invoice Document" size="x-small" onclick={invoiceDocument} class="clickableIcon" data-index={index} title="Invoice Document"></lightning-icon>&nbsp;&nbsp;-->
                                                <!--<lightning-icon icon-name="utility:payment_gateway" alternative-text="Invoice Payment" size="x-small" onclick={invoicePayment} class="clickableIcon" data-index={index} title="Invoice Payment"></lightning-icon>&nbsp;&nbsp;-->
                                                <lightning-helptext icon-name="doctype:gdoc" content="Invoice Document" data-index={index} onclick={invoiceDocument} class="maq-xust"></lightning-helptext>&nbsp;&nbsp;
                                                <!--<lightning-helptext icon-name="utility:payment_gateway" content="Invoice Payment" onclick={selectPaymentMode}></lightning-helptext>&nbsp;&nbsp;-->
                                                <div class="erp_Mark7 maqsood disInBlc">
                                                    <div class="dropdown width100" >
                                                        <lightning-icon icon-name="utility:info" alternative-text="Info" size="x-small"></lightning-icon>
                                                        <div class="dropdown-content">                                                        
                                                            <h1 class="order-details"><strong>{inv.Name}</strong></h1>
                                                            <div class="slds-grid">
                                                                <div class="col-7 slds-truncate">
                                                                    <strong>{labels.Posted}</strong>    <br/>
                                                                    <div if:true={inv.ERP7__Posted__c}><strong>{labels.Posted}&nbsp;{labels.Date}</strong><br/></div>
                                                                    <strong>{labels.Invoice_Date}</strong>    <br/>     
                                                                    <strong>{labels.Paid_Amount}</strong><br/>
                                                                    <strong>{labels.Applied_Credit}</strong>                                                                
                                                                </div>
                                                                <div class="col-5">
                                                                    <strong>{inv.isPosted}</strong> <br/>
                                                                    <div if:true={inv.ERP7__Posted__c}><strong>{inv.ERP7__Posted_Date__c}</strong> <br/> </div>
                                                                    <strong>{inv.ERP7__Invoice_Date__c}</strong> <br/>  
                                                                    <strong><lightning-formatted-number format-style="currency" value={inv.ECPQ__Paid_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number></strong> <br/>
                                                                    <strong><lightning-formatted-number format-style="currency" value={inv.ECPQ__Credit_Note__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number></strong>
                                                                </div>
                                                            </div>                                             
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                    <template if:false={isInvoiceList}>
                                    <tr>
                                        <td colspan="5">
                                            <div class="alert alert-warning d-flex align-items-center" role="alert">
                                                <i class="mdi mdi-alert-circle-check icon-size-warning mr-2"></i>
                                                <div>{labels.Invoice}&nbsp;{labels.not_found}</div>
                                            </div>
                                        </td>
                                    </tr>    
                                </template>
                                </tbody>
                            </table> 
                          
                   
                    
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th width="20%">{labels.Payment}&nbsp;{labels.Name}</th>
                                    <th width="20%">{labels.Type}</th>                                                            
                                    <th width="20%">{labels.Date}</th>
                                    <th width="20%">{labels.Amount}</th>
																		<th width="20%">&nbsp;</th>
                                </tr> 
                            </thead>
                            <tbody>
                                <template if:true={paymentList} for:each={paymentList} for:item="pay">
                                    <tr key={pay.Id}>
                                        <td><lightning-formatted-url value={pay.paymenturl} label={pay.Name} target="_blank"></lightning-formatted-url> </td>
                                        <td>{pay.ERP7__Payment_Type__c}</td>                                                                
                                        <td>{pay.ERP7__Payment_Date__c}</td>
                                        <td><lightning-formatted-number format-style="currency" value={pay.ERP7__Total_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number></td>
																				<td>&nbsp;</td>
                                    </tr>
                                </template>
                                <template if:false={isPaymentList}>
                                <tr>
                                    <td colspan="5">
                                    <div class="alert alert-warning d-flex align-items-center" role="alert">
                                        <i class="mdi mdi-alert-circle-check icon-size-warning mr-2"></i>
                                        <div>
                                           
                                            {labels.Payment}&nbsp;{labels.not_found}
                                            
                                        </div>
                                        </div>
                                        </td>
                                </tr>    
                            </template>
                            </tbody>                                                    
                        </table>
                   
               
						</div>
				
        <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12 slds-large-size_3-of-12 slds-p-left_small">
						<button type="button"  class="btn btn-lighten-warning waves-effect  width-md waves-warning mb-1 text-left" onclick={createInvoice}><i class="mdi mdi-file-document mr-1"></i>{labels.Create}&nbsp;{labels.Invoice}</button>
						<template if:true={isInvoiceList}>
                <button type="button"  class="btn btn-lighten-info waves-effect  width-md waves-info mb-1 text-left" onclick={openCardPayModal}><i class="mdi mdi-credit-card-multiple mr-1"></i>{labels.Credit}/{labels.Debit}&nbsp;{labels.Card}</button>
                <button type="button"  class="btn btn-lighten-info waves-effect  width-md waves-info mb-1 text-left" onclick={openBankPaymentModal}><i class="mdi mdi-credit-card mr-1"></i>{labels.Bank}&nbsp;/&nbsp;{labels.Cheque}</button>
                <button type="button"  class="btn btn-lighten-info waves-effect  width-md waves-info mb-1 text-left" onclick={openCashPaymentModal}><i class="mdi mdi-cash-multiple mr-1"></i>{labels.Cash_Payment}</button>
                <button type="button"  class="btn btn-lighten-success waves-effect  width-md waves-success mb-1 text-left" onclick={openApplyLoyalty}><i class="mdi mdi-smart-card mr-1"></i>{labels.Loyalty}</button>
                <button type="button"  class="btn btn-lighten-success waves-effect  width-md waves-success mb-1 text-left" onclick={openApplyCreditModal}><i class="mdi mdi-star-box-multiple-outline mr-1"></i>{labels.Apply_Credit}</button>                                  
            </template> 
            <!--<lightning-button variant="brand" label="Create Invoice" icon-name="standard:picklist_type" class="slds-m-left_small" onclick={createInvoice}></lightning-button><br/><br/>
            <template if:true={isInvoiceList}>
                <lightning-button variant="brand" label="Credit/Debit Card" icon-name="custom:custom40" class="slds-m-left_small" onclick={openCardPayModal}></lightning-button><br/>
                <lightning-button variant="brand" label="Bank / Cheque" icon-name="custom:custom16" class="slds-m-left_small" onclick={openBankPaymentModal}></lightning-button><br/>
                <lightning-button variant="brand" label="Cash" icon-name="custom:custom41" class="slds-m-left_small" onclick={openCashPaymentModal}></lightning-button><br/>
                <lightning-button variant="brand" label="Loyality" icon-name="utility:dash" class="slds-m-left_small" onclick={openApplyLoyalty}></lightning-button><br/>
                <lightning-button variant="brand" label="Apply Credits" icon-name="custom:custom45" class="slds-m-left_small" onclick={openApplyCreditModal}></lightning-button><br/>                                    
            </template>  -->                              
        </div>
						</div>
    </div>

    <template if:true={isCardPaymentModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large" aria-labelledby="modal-heading-01" aria-modal="true">
            <div class="erp_Mark7 slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close">
                        <lightning-icon icon-name="utility:close" class="customfill" alternative-text="Close" title="Close" onclick={closeCardPaymentModal}></lightning-icon>
                    </button>
                    <div class="slds-grid">
                        <div class="col-md-4">
                            <h2 class="slds-modal__title slds-hyphenate talignleft">{labels.Card}&nbsp;{labels.Payment}</h2>
                        </div>
                        
                        <div class="col-md-4">
                            <div><div class="required">*</div><label>{labels.Payment_Gateway}</label></div>
                            <lightning-combobox  class='no-input-lable' value={selectedGateway} placeholder={labels.Select_Payment_Gateway} options={paymentGateway} onchange={handlePaymentGateway} ></lightning-combobox>
                            <!--<c-custom-input-lookup-l-w-c obj-name="Account" search-placeholder="Search..." icon-name="standard:account" onremove={removeOrg} onlookupselected={selectOrg}  is-value-selected={orgSelected} selected-value={order.ERP7__Organisation__r.Id} selected-name={order.ERP7__Organisation__r.Name} selected-name-url={selectOrgUrl} filter={orgFilter}> </c-custom-input-lookup-l-w-c>   -->                                             
                         </div>
                     </div>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    
                    <div class="container-fluid">
                        <div class="row slds-m-top--xx-small">
                            <div class="col-md-12 col-sm-12 col-xs-12">
                                <div if:true={paymentError} class="required">
                                    *&nbsp;<lightning-formatted-text value={paymentError}></lightning-formatted-text>
                                </div>
                            </div>
                        </div>
                        <table class="slds-table slds-table--bordered">
                            <thead>
                                <tr>
                                    <th><!--<div if:true={isinvoiceToPay}><lightning-input type="checkbox" onchange={checkAllInvToPay} checked={checkAllInv}></lightning-input></div>--></th>
                                    <th>{labels.Invoice_Name}</th>
                                    <th>{labels.Type}</th>
                                    <th>{labels.Posted}</th>
                                    <th>{labels.Date}</th>
                                    <th>{labels.Total_Amount}</th>
                                    <th>{labels.Paid_Amount}</th>
                                    <th>{labels.Due_Amount}</th>
                                    <th>{labels.Amount_to_be_Paid}</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template if:true={invoiceToPay} for:each={invoiceToPay} for:item="invToPay" for:index="index">
                                    <tr key={invToPay.trKey}>
                                        <td>
                                            <lightning-input type="checkbox" variant="label-hidden" checked={invToPay.checked} onchange={handlePayInvCheck} data-index={index} disabled={invToPay.disableCheckbox}></lightning-input><!--data-id="checkbox"-->
                                        </td>
                                        <td>
                                            <lightning-formatted-url value={invToPay.invoiceurl} label={invToPay.Name} target="_blank"></lightning-formatted-url> 
                                        </td>
                                        <td>
                                            <lightning-formatted-text value={invToPay.RecordType.DeveloperName}></lightning-formatted-text>
                                        </td>
                                        <td>
                                            <div class={invToPay.isPostedClass}>{invToPay.isPosted}</div>
                                        </td>
                                        <td>
                                            {invToPay.ERP7__Invoice_Date__c}
                                        </td>
                                        <td>
                                            <lightning-formatted-number format-style="currency" value={invToPay.ERP7__Invoice_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                        </td>
                                        <td>
                                            <lightning-formatted-number format-style="currency" value={invToPay.ERP7__Paid_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                        </td>
                                        <td>
                                            <lightning-formatted-number format-style="currency" value={invToPay.ERP7__Total_Due__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                        </td>
                                        <td>
                                            <lightning-input type="number" formatter="currency" variant="label-hidden" value={invToPay.AmountToPaid} oncommit={handleInvDue} data-index={index} step=".0001" required="true"></lightning-input>
                                        </td>
                                        <td>
                                            <div if:false={invToPay.isAdvance}>
                                                <lightning-button-menu alternative-text="Show menu">
                                                    <lightning-menu-item onclick={postInvoice} label={invToPay.postLable} data-index={index}></lightning-menu-item>                                                                    
                                                </lightning-button-menu>
                                            </div>                                                                
                                        </td>
                                    </tr>
                                </template> 
                                <template if:false={isinvoiceToPay}>
																		<tr>
																			<td colspan="10">
																						<div class="alert alert-warning d-flex align-items-center mb-0 p-1" role="alert">
																							<i class="mdi mdi-alert-circle-check icon-size-warning mr-2"></i>
																						<div>
                                                                                            {labels.Due_Invoice_not_available}
																						</div>
                                      </div>
																			</td>
																		</tr>
																			
                                    
                                </template>                                  
                            </tbody>                                                
                        </table>
                        

                        <div class="slds-grid slds-wrap slds-m-top--xx-small" >    
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span> {labels.Card_Holder_Name}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={PaymentMethod.ERP7__Name_on_Card__c} oncommit={handleCardName} required="true"></lightning-input>                                                            
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span> {labels.Card_Type}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox  variant="label-hidden" value={PaymentMethod.ERP7__CardType__c} placeholder={labels.Select} options={CardTypes} onchange={handleCardType} ></lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span> {labels.Card_Number}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" type="password" value={PaymentMethod.ERP7__Card_Number__c} oncommit={handleCardNumber}></lightning-input>                                                             
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span>{labels.CVV}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" type="password" value={CVV} oncommit={handleCVV} max-length="4" required="true"></lightning-input>                                                             
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span> {labels.Expiry_Month}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox  variant="label-hidden" value={PaymentMethod.ERP7__Card_Expiration_Month__c} placeholder={labels.Select} options={ExpiryMonth} onchange={handleCardExpMonth} ></lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span> {labels.Expiry_Year}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox  variant="label-hidden" value={PaymentMethod.ERP7__Card_Expiration_Year__c} placeholder={labels.Select} options={ExpiryYear} onchange={handleCardExpYear} ></lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <!--<div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Actual Amount</label>
                                    <div class="slds-form-element__control">
                                        <lightning-formatted-number value={finalDue} format-style="currency" currency-code={orderCurrency} currency-display-as="code"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div> -->                                               
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">{labels.Reference_No}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={paymentToUpsert.ERP7__Reference_Cheque_No__c} oncommit={handleRefCheque}></lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span>{labels.Payment_Amount}</label><lightning-helptext content={labels.In_case_of_different_currency_change_the_currency_of_the_Order}></lightning-helptext>
                                    <div class="slds-form-element__control">
                                        <lightning-formatted-number value={paymentToUpsert.ERP7__Total_Amount__c} format-style="currency" currency-code={orderCurrency} currency-display-as="code" maximum-fraction-digits="2"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div>                                                
                        </div>
                        <br/>
                        <div class="container-fluid"> 
                            <h2><strong>{labels.Billing_Address}</strong></h2>
                            <div class="row slds-m-top--xx-small">                                                                                                    
                                <div class="col-md-4 col-sm-4 col-xs-12">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">{labels.Address_line_1}</label>
                                        <div class="slds-form-element__control">
                                            <lightning-input variant="label-hidden" value={paymentBillAdd.ERP7__Address_Line1__c} oncommit={handleBillLine1}></lightning-input>                                                                
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4 col-sm-4 col-xs-12">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">{labels.Address_line_2}</label>
                                        <div class="slds-form-element__control">
                                            <lightning-input variant="label-hidden" value={paymentBillAdd.ERP7__Address_Line2__c} oncommit={handleBillLine2}></lightning-input> 
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4 col-sm-4 col-xs-12">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">{labels.City}</label>
                                        <div class="slds-form-element__control">
                                            <lightning-input variant="label-hidden" value={paymentBillAdd.ERP7__City__c} oncommit={handleBillCity}></lightning-input> 
                                        </div>
                                    </div>
                                </div>

                                <div class="col-md-4 col-sm-4 col-xs-12">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label"><span class="required">*</span> {labels.Country}</label>
                                        <div class="slds-form-element__control">
                                            <lightning-combobox  variant="label-hidden" value={paymentBillAdd.ERP7__Country__c} placeholder={labels.Select} options={CountryList} onchange={handleBillCountry} ></lightning-combobox>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="col-md-4 col-sm-4 col-xs-12">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label"><span class="required">*</span> {labels.State_Province}</label>
                                        <div class="slds-form-element__control">
                                            <lightning-combobox  variant="label-hidden" value={paymentBillAdd.ERP7__State__c} placeholder={labels.Select} options={CountyList} onchange={handleBillState} ></lightning-combobox>
                                        </div>

                                            <lightning-formatted-number format-style="currency" value={invToPay.ERP7__Total_Due__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                        </td>
                                        <td>
                                            <lightning-input type="number" formatter="currency" variant="label-hidden" value={invToPay.AmountToPaid} oncommit={handleInvDue} data-index={index} step=".0001" required="true"></lightning-input>
                                        </td>
                                        <td>
                                            <div if:false={invToPay.isAdvance}>
                                                <lightning-button-menu alternative-text="Show menu">
                                                    <lightning-menu-item onclick={postInvoice} label={invToPay.postLable} data-index={index}></lightning-menu-item>                                                                    
                                                </lightning-button-menu>
                                            </div>                                                                
                                        </td>
                                    </tr>
                                </template> 
                                <template if:false={isinvoiceToPay}>
																		<tr>
																			<td colspan="10">
																		<div class="alert alert-warning d-flex align-items-center mb-0 p-1" role="alert">
                                        <i class="mdi mdi-alert-circle-check icon-size-warning mr-2"></i>
                                        <div>
                                            {labels.Due_Invoice_not_available}
                                        </div>
                                      </div>
																				</td>
																		</tr>
                                </template>                                  
                            </tbody>                                                
                        </table>
                        
                        <br/>
                        <div class="slds-grid slds-wrap slds-m-top--xx-small" >                                                                                                                                                
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">        
                                    <label class="slds-form-element__label">{labels.Order}&nbsp;{labels.Amount}</label>                                                
                                    <div class="slds-form-element__control">                                        
                                        <lightning-formatted-number format-style="currency" value={order.ERP7__Order_Amount__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div>                       
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span>{labels.Invoice_Amount} </label><lightning-helptext content={labels.In_case_of_different_currency_change_the_currency_of_the_Order}></lightning-helptext>
                                    <div class="slds-form-element__control">
                                        <lightning-formatted-number value={paymentToUpsert.ERP7__Total_Amount__c} format-style="currency" currency-code={orderCurrency} currency-display-as="code" maximum-fraction-digits="2"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label"><span class="required">* </span>{labels.Apply_Credit}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-formatted-number value={appliedCreditAmount} format-style="currency" currency-code={orderCurrency} currency-display-as="symbol" maximum-fraction-digits="2"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">{labels.Balance_Amount}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-formatted-number value={balanceAmount} format-style="currency" currency-code={orderCurrency} currency-display-as="symbol" maximum-fraction-digits="2"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">           
                                    <label class="slds-form-element__label">{labels.Available_Credit} </label>                                             
                                    <div class="slds-form-element__control">                                        
                                        <lightning-formatted-number format-style="currency" value={order.Account.ERP7__Available_Credit_Balance__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-3 col-xs-12">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">{labels.Reference_No}</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input variant="label-hidden" value={paymentToUpsert.ERP7__Reference_Cheque_No__c} oncommit={handleBankRefCheque}></lightning-input>
                                    </div>
                                </div>
                            </div>                                         
                        </div>

                        <br/>
                        <table class="slds-table slds-table--bordered">
                            <thead>
                                <tr>
                                    <th>{labels.Credit_Note}</th>
                                    <th>{labels.Available_Credit}</th>
                                    <th>{labels.Debit}</th>
                                    <th>{labels.Balance}</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template if:true={availableCredits} for:each={availableCredits} for:item="cn" for:index="index">
                                    <tr key={cn.credNote.Id}>                                        
                                        <td>
                                            <lightning-formatted-url value={cn.credNote.credNoteurl} label={cn.credNote.Name} target="_blank"></lightning-formatted-url> 
                                        </td>
                                        <td>
                                            <lightning-formatted-number format-style="currency" value={cn.credNote.ERP7__Balance__c} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>                                            
                                        </td>
                                        <td>
                                            <lightning-input type="number" formatter="currency" variant="label-hidden" value={cn.debitAmount} max={cn.credNote.maxValue} message-when-range-overflow="Can not enter more than available credit" oncommit={updateDebitAmount} data-index={index} step=".01"></lightning-input>
                                        </td>
                                        <td>
                                            <lightning-formatted-number format-style="currency" value={cn.credNote.amountDue} currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>  
                                        </td>                                        
                                    </tr>
                                </template> 
                                <template if:false={isavailableCredits}>
																		<tr>
																			<td colspan="5">
																		<div class="alert alert-warning d-flex align-items-center mb-0 p-1" role="alert">
                                        <i class="mdi mdi-alert-circle-check icon-size-warning mr-2"></i>
                                        <div>
                                            {labels.Credit_Note_not_available}
                                        </div>
                                      </div>
																				</td>
																		</tr>
                                </template>                                  
                            </tbody>                                                
                        </table>
                        
                    </div>
                </div>
                <footer class="slds-modal__footer text-center">
                    <lightning-button label={labels.Cancel} variant="neutral" onclick={closeApplyCreditModal} class="mr-2"></lightning-button>
                    <lightning-button label={labels.Apply_Credit} variant="brand" onclick={applyCreditSave} ></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    
</template>
