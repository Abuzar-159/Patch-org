<template> 
    <div class="bg-theme erp_mark7">
        <template if:true={spinner}>
            <lightning-spinner variant="brand" size="large" alternative-text="Please wait while loading..."></lightning-spinner>        
        </template>
            
        <div if:true={isErrorList} > <!--class="yourDiv"-->
            <div class="slds-notify_container slds-is-absolute">
                <div class="slds-notify slds-notify_toast slds-theme_error" role="status">
                    <span class="slds-assistive-text">warning</span>
                    <span class="slds-icon_container slds-icon-utility-error slds-m-right_small slds-no-flex slds-align-top" title="Close">
                        <lightning-icon icon-name="utility:error" alternative-text="Close" size="x-small" variant="bare"></lightning-icon>                      
                    </span>
                    <div class="slds-notify__content">                    
                        <template for:each={errorList} for:item="error" for:index='ind'  key={error}>
                            <h2 class="slds-text-heading_small color-white" key={error}>{error}</h2>                                
                        </template>
                    </div>
                    <div class="slds-notify__close">
                        <button class="slds-button slds-button_icon slds-button_icon-inverse" title="Close">
                            <lightning-icon icon-name="utility:close" alternative-text="Close" size="x-small" class="clickableIcon" variant="bare" onclick={closeErrorList}></lightning-icon>                        
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div if:true={showMainPage}> <!--<div if:true={mainPage}>-->
            <!-- Begin page -->
        <div id="wrapper" class="bg-white">
            <div class="container-fluid">
                <!-- Navigation Bar-->
                <header id="topnav">            
                    <div class="topbar-menu">
                        <div class="container-fluid">
                            <div id="navigation">
                                <!-- Navigation Menu-->
                                <ul class="navigation-menu">                            
                                    <li class="has-submenu">
                                        <a class={orderTabClass} onclick={showOrderTab}><i class="mdi mdi-file-document"></i>{labels.Order}</a>
                                    </li>                            
                                    <li class="has-submenu">
                                        <a class={discountTabClass} onclick={showDiscountTab}> <i class="mdi mdi-percent"></i>{labels.Discount} <div class="arrow-down"></div></a>                      
                                    </li>                            
                                    <li class="has-submenu">
                                        <a class={paymentTabClass} onclick={showPaymentTab}> <i class="mdi mdi-credit-card"></i>{labels.Payment} <div class="arrow-down"></div></a>                      
                                    </li>                            
                                    <li class="has-submenu">
                                        <a class={deliveryTabClass} onclick={showDeliveryTab}> <i class="mdi mdi-truck-fast"></i>{labels.Delivery} <div class="arrow-down"></div></a>                  
                                    </li>                            
                                    <li class="has-submenu">
                                        <a class={chatterTabClass} onclick={showChatterTab}> <i class="mdi mdi-wechat"></i>Chatter <div class="arrow-down"></div></a>                      
                                    </li>                            
                                    <li class="has-submenu">
                                        <a class={accountTabClass} onclick={showAccountTab}> <i class="mdi mdi-book-account"></i>{labels.Account} <div class="arrow-down"></div></a>                      
                                    </li>                            
                                </ul>
                                <!-- End navigation menu -->                        
                                <div class="clearfix"></div>
                            </div>
                            <!-- end #navigation -->
                        </div>
                        <!-- end container -->
                    </div>
                </header>
                <!-- end navbar-custom -->
            </div>
        </div>
        <div class="slds-grid slds-wrap">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12 slds-large-size_5-of-12 slds-p-around_x-small pr-1 pb-0">
                <div class="card-box mb-1 min-height301">            
                    <!--Account and Contacts Area-->
                    <div class="erp_Mark7">
                        <div class="row m-0">
                            <div class='col-md-4 slds-p-bottom_small slds-p-top_small'>
                                <div><label>{labels.AccountName}</label><div class="required">*</div></div>
                                <c-custom-input-lookup-l-w-c obj-name="Account" search-placeholder={labels.Search} icon-name="standard:account" onremove={handleRefreshComponent} onlookupselected={selectAccount}  is-value-selected={accountSelected} selected-value={order.Account.Id} selected-name={order.Account.Name} selected-name-url={customerUrl} filter="ERP7__Account_Type__c ='Customer'"> </c-custom-input-lookup-l-w-c>
                            </div>
     
                            <div class='col-md-4 slds-p-bottom_small slds-p-top_small'>
                                <div><label>{labels.AccountNumber}</label></div>
                                <lightning-input value={order.Account.AccountNumber} disabled="true" class='no-input-lable'></lightning-input>
                            </div>       
    
                            <div class='col-md-4 slds-p-bottom_small'>
                                <div><label>{labels.Title}</label></div>
                                <lightning-input  disabled="true" class='no-input-lable' placeholder={labels.Title} value={order.ERP7__Contact__r.Title}></lightning-input>
                            </div>     
                            
                            <div class='col-md-4 slds-p-bottom_small slds-p-top_small'>
                                <div><label>{labels.Contact}</label><div class="required">*</div></div>
                                <c-custom-input-lookup-l-w-c obj-name="Contact" search-placeholder={labels.Search} icon-name="standard:contact" onremove={removeContact} onlookupselected={selectContact}  is-value-selected={contactSelected} filter={contactFilter} selected-value={order.ERP7__Contact__r.Id} selected-name={order.ERP7__Contact__r.Name} selected-name-url={contactUrl}> </c-custom-input-lookup-l-w-c>
                            </div>
                            
                            <div class='col-md-4 slds-p-bottom_small'>
                                <div><label>{labels.ContactEmail}</label></div>
                                <lightning-input value={order.ERP7__Contact__r.Email} disabled="true" class='no-input-lable' placeholder="Email..."></lightning-input>
                            </div>
                            <div class='col-md-4 slds-p-bottom_small'>
                                <div><label>{labels.Contact_Phone}</label></div>
                                <lightning-input value={order.ERP7__Contact__r.Phone} disabled="true" class='no-input-lable' placeholder={labels.Phone}></lightning-input>
                            </div>
                            <!-- <div class='col-md-4 slds-p-bottom_small'>
                                <div><label>Contact Mobile</label></div>
                                <lightning-input value={order.ERP7__Contact__r.MobilePhone} disabled="true" class='no-input-lable' placeholder='Mobile...'></lightning-input>
                            </div> -->
                            <div class='col-md-6 slds-p-bottom_small'>
                                <div><label>{labels.Bill_To}</label><div class="required">*</div></div>
                                <c-custom-input-lookup-l-w-c obj-name="ERP7__Address__c" search-placeholder={labels.Search} icon-name="standard:address" onremove={removeBillTo} onlookupselected={selectBillTo}  is-value-selected={billToSelected} filter={billToFilter} selected-value={order.ERP7__Bill_To_Address__r.Id} selected-name={order.ERP7__Bill_To_Address__r.Name} selected-name-url={billToAddUrl} hide-remove={isProdSelected}> </c-custom-input-lookup-l-w-c>
                            </div>
                            <div class='col-md-6 slds-p-bottom_small'>
                                <div><label>{labels.Ship_To}</label><div class="required">*</div></div>
                                <c-custom-input-lookup-l-w-c obj-name="ERP7__Address__c" search-placeholder={labels.Search} icon-name="standard:address" onremove={removeShipTo} onlookupselected={selectShipTo}  is-value-selected={shipToSelected} filter={shipToFilter} selected-value={order.ERP7__Ship_To_Address__r.Id} selected-name={order.ERP7__Ship_To_Address__r.Name} selected-name-url={shipToAddUrl} hide-remove={isProdSelected}> </c-custom-input-lookup-l-w-c>
                            </div>
                            <div class='col-md-6 slds-p-bottom_small'>
                                <lightning-textarea placeholder={labels.Billing_Address} class='no-input-lable' disabled="true" value='{billToAddFull}'></lightning-textarea>
                            </div>
                            <div class='col-md-6 slds-p-bottom_small'>
                                <lightning-textarea placeholder={labels.Shipping_Address} class='no-input-lable' disabled="true" value={shipToAddFull}></lightning-textarea>
                            </div>                    
                        </div>
                    </div>
                </div>
            </div>
            <!--Account and Contacts Area ends-->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_7-of-12 slds-large-size_7-of-12 slds-p-around_x-small pl-0 pb-0 "> 
                <!--Order Tabs starts-->
                <div class="card-box mb-1 min-height301 p-1" >
                    <template if:true={isShowOrder}>
                        <div class="erp_Mark7" >
                            <div class="row m-0">
                                <div class='col-md-12 pl-0 pr-0'>
                                    
                                    <div class="row m-0">
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Order}</label></div>
                                            <c-custom-input-lookup-l-w-c obj-name="Order" search-placeholder={labels.Search} icon-name="standard:orders" onremove={handleRefreshComponent} onlookupselected={selectOrder}  is-value-selected={orderSelected} selected-value={order.Id} selected-name={order.Name} filter={OrderFilter} selected-name-url={orderUrl}> </c-custom-input-lookup-l-w-c> <!--onremove={removeOrder}-->
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Order_Profile}</label><div class="required">*</div></div>
                                            
                                            <c-custom-input-lookup-l-w-c obj-name="ERP7__Profiling__c" search-placeholder={labels.Search} icon-name="standard:user_role" onremove={removeOrderProfile} onlookupselected={selectOrderProfile}  is-value-selected={OrderProfileSelected} filter={OrderProfileFilter} selected-value={order.ERP7__Order_Profile__r.Id} selected-name={order.ERP7__Order_Profile__r.Name} selected-name-url={OrderPofileUrl} hide-remove={isProdSelected}> </c-custom-input-lookup-l-w-c>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'> 
                                            <div><label>{labels.Employee}</label><div class="required">*</div></div>
                                            <c-custom-input-lookup-l-w-c obj-name="ERP7__Employees__c" search-placeholder={labels.Search} icon-name="standard:user" onremove={removeEmployee} onlookupselected={selectEmployee}  is-value-selected={employeeSelected} filter={employeeFilter} selected-value={order.ERP7__Employee__r.Id} selected-name={order.ERP7__Employee__r.Name} selected-name-url={employeeUrl}> </c-custom-input-lookup-l-w-c>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_medium-custom'> 
                                            <div if:true={isOrderHasId}>
                                                <button  onclick={openOrderDoc} class="btn btn-lighten-primary waves-effect waves-primary width-100p"><i class="mdi mdi-file-document mr-1"></i>&nbsp;{labels.Order_Document}</button>
                                            </div> <!--icon-name="action:record" label='Order Document'-->
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <template if:true={isMultiCurrency}>
                                                
                                            </template>
                                            <div><label>{labels.Order}&nbsp;{labels.Currency}</label></div>
                                            <lightning-combobox  class='no-input-lable' value={order.CurrencyIsoCode} placeholder={labels.Select} options={allCurrencies} onchange={handleCurrency} ></lightning-combobox>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Payment_Status}</label></div>
                                            <lightning-input value={order.ERP7__Payments_Status__c} class='no-input-lable' disabled="true"></lightning-input>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Project}</label></div>
                                            <c-custom-input-lookup-l-w-c obj-name="ERP7__Project__c" search-placeholder={labels.Search} icon-name="custom:custom33" onremove={removeProject} onlookupselected={selectProject}  is-value-selected={projectSelected} selected-value={order.ERP7__Project__r.Id} selected-name={order.ERP7__Project__r.Name} selected-name-url={selectProjectUrl}> </c-custom-input-lookup-l-w-c>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Order}&nbsp;{labels.Reference_No}</label></div>
                                            <lightning-input value={order.OrderReferenceNumber} class='no-input-lable' oncommit={handleOrdRef} maxlength="200" message-when-too-long="Order Reference must not be more than 10 characters."></lightning-input>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Order}&nbsp;{labels.Start_Date}</label><div class="required">*</div></div>
                                            <lightning-input type="date" value={order.EffectiveDate} class='no-input-lable' onchange={handleEffDate}></lightning-input>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Order}&nbsp;{labels.Expected_Date}</label></div>
                                            <lightning-input type="date" value={order.ERP7__Expected_Date__c} class='no-input-lable' onchange={handleExpDate}></lightning-input>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Shipment_Type}</label></div>
                                            <lightning-combobox  class='no-input-lable' value={order.ERP7__Shipment_Type__c} placeholder={labels.Select} options={shipmentType} onchange={handleChangeShipment} ></lightning-combobox>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Status}</label><div class="required">*</div></div>
                                            <lightning-combobox  class='no-input-lable' value={order.Status} placeholder={labels.Select} options={ordStatus} onchange={handleChangeStatus} ></lightning-combobox>                        
                                        </div>
                                        
                                        <div class='col-md-6 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                            <div><label>{labels.Special_Instructions}</label></div>
                                            <lightning-textarea  class='no-input-lable' placeholder={labels.Description} value={order.Description} onblur={handleOrdDescription} maxlength="250" message-when-too-long="Special Instructions must not be more than 250 characters."></lightning-textarea>
                                        </div>
                                        <div class='col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small'>                                
                                            <lightning-input type='checkbox' label={labels.Is_Back_Order} checked={order.ERP7__Is_Back_Order__c} disabled></lightning-input>
                                            <lightning-input type='checkbox' label={labels.Is_Pre_Order} checked={order.ERP7__Is_Pre_Order__c} disabled></lightning-input>
                                        </div>
                                        <div class="col-md-3 slds-p-bottom_xx-small slds-p-top_xx-small">
                                            <!--<lightning-input type='checkbox' label='Authorized' checked={order.ERP7__Authorised__c} disabled={order.ERP7__Authorised__c} onchange={handleAuthorize}></lightning-input>    -->                            
                                            <lightning-input type='checkbox' label={labels.Issue_Invoice} checked={order.ERP7__Issue_Invoice__c}  onchange={handleIssInv}></lightning-input><!--disabled={order.ERP7__Issue_Invoice__c}-->
                                            <lightning-input type='checkbox' label='{labels.Is_Closed_RMA}' checked={order.ERP7__Is_Closed__c} onchange={handleIsClose}></lightning-input><!--disabled={order.ERP7__Is_Closed__c}-->
                                            
                                        </div>
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </template>
                    <template if:true={isShowDiscount}>
                        <div class="card-box mb-1 p-1">
                            <h4 class="header-title mb-1"><strong>{labels.Order}&nbsp;{labels.Discount}</strong></h4>
                            <div class="row m-0">
                                <div class='col-md-4 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                    <div><label>{labels.Order}&nbsp;{labels.Discount}&nbsp;{labels.Amount}</label></div>
                                    <lightning-input variant="label-hidden" type=number formatter=currency value={order.ERP7__Order_Discount__c} oncommit={handleDisAmt} step='.01'></lightning-input>
                                </div>
                                
                                <div class='col-md-4 slds-p-bottom_xx-small slds-p-top_xx-small'>
                                    <div><label>{labels.Order}&nbsp;{labels.Discount}&nbsp;{labels.Description}</label></div>
                                    <lightning-textarea variant="label-hidden" placeholder={labels.Description} value={order.ERP7__Order_Discount_Description__c} onblur={handleDistDesc} maxlength="250" message-when-too-long="Discount Description must not be more than 250 characters."></lightning-textarea>
                                </div>
                                
                            </div>
                        </div>
                        <div class="card-box mb-1 p-1">  
                            <h4 class="header-title mb-1"><strong>{labels.Coupon_Discount}</strong></h4>
                            <div class='slds-p-bottom_xx-small slds-p-top_xx-small'>
                                
                                <div><label>{labels.Coupon_Codes}</label></div>
                                <div class="slds-grid">
                                    <lightning-input variant="label-hidden" value={couponCode} onchange={handlecouponCode} class="slds-p-right_small"></lightning-input>
                                    <lightning-button label={labels.Apply} variant="brand" onclick={ApplyCoupon} disabled={disableApply}></lightning-button>
                                </div>
                            </div> 
                            <table class="slds-table slds-table_bordered slds-m-top_small">
                                <thead>
                                    <tr>
                                        <th>{labels.Name}</th>
                                        <th>{labels.Coupon}</th>
                                        <th>{labels.Applied}&nbsp;{labels.Date}</th>
                                        <th>{labels.Amount}</th>
                                        <!--<th></th>-->
                                    </tr>
                                </thead>
                                <tbody>
                                    <template if:true={iscouponRemList} for:each={couponRemList} for:item="cpn" for:index="index">
                                        <tr key={cpn.Id}>
                                            <td>
                                                <lightning-formatted-url label={cpn.Name} value={cpn.nameUrl} target="_blank"></lightning-formatted-url>                                                    
                                            </td>
                                            <td>
                                                <lightning-formatted-url label={cpn.ERP7__Coupon__r.Name} value={cpn.ERP7__Coupon__r.CPUrl} target="_blank"></lightning-formatted-url>
                                            </td>
                                            <td>
                                                {cpn.ERP7__Redemption_Date__c}
                                            </td>
                                            <td>
                                                <lightning-formatted-number value={cpn.ERP7__Value__c} format-style="currency"></lightning-formatted-number>                                                    
                                            </td>
                                            <!--<td>
                                                    <lightning-icon icon-name="action:delete" alternative-text="Delete" size="xx-small" onclick={DeleteCoupon} class="clickableIcon" data-index={index}></lightning-icon>
                                                </td>-->
                                        </tr>
                                    </template>
                                    <template if:false={iscouponRemList}>
                                        <tr>
                                            <td colspan="4">
                                                <div class="alert alert-warning d-flex align-items-center mb-0 p-1" role="alert">
                                                    <i class="mdi mdi-alert-circle-check icon-size-warning"></i>
                                                    <div>
                                                        {labels.No_Coupon_Redeem}
                                                    </div>
                                                </div>
                                                
                                            </td>
                                        </tr>
                                    </template>
                                    <!--<template if:true={couponList} for:each={couponList} for:item="cpn" for:index="index">
                                            <tr key={cpn.Id}>
                                                <td>
                                                    <lightning-formatted-url label={cpn.Name} value={cpn.nameUrl} target="_blank"></lightning-formatted-url>                                                    
                                                </td>
                                                <td>
                                                    <lightning-formatted-url label={cpn.ERP7__Coupon_Redemption__r.ERP7__Coupon__r.Name} value={cpn.ERP7__Coupon_Redemption__r.ERP7__Coupon__r.nameUrl} target="_blank"></lightning-formatted-url>
                                                </td>
                                                <td>
                                                    {cpn.ERP7__Applied_Date__c}
                                                </td>
                                                <td>
                                                    <lightning-formatted-number value={cpn.ERP7__Amount__c} format-style="currency"></lightning-formatted-number>                                                    
                                                </td>
                                                <td>
                                                    <lightning-icon icon-name="action:delete" alternative-text="Delete" size="xx-small" onclick={DeleteCoupon} class="clickableIcon" data-index={index}></lightning-icon>
                                                </td>
                                            </tr>
                                        </template>-->
                                </tbody>
                            </table>
                        </div>
                    </template>
                    <template if:true={isShowPayment}>
                        <c-epos-payment onpayment={RefreshOrder} order={order} order-currency={orderCurrency} invoice-list={invoiceList} is-invoice-list={isInvoiceList} payment-list={paymentList} is-payment-list={isPaymentList}></c-epos-payment>
                    </template>
                    <template if:true={isShowDelivery}>
                        <c-epos-delivery onshipment={RefreshOrder} order={order} shipments-list={shipmentsList} is-shipments-list={isShipmentsList} is-order-has-id={isOrderHasId}></c-epos-delivery>
                    </template>
                    <template if:true={isShowChatter}>
                        <iframe src="/apex/ERP7__ChatterLC?core.apexpages.devmode.url=1" width="100%" height="300px;" frameborder="0" align="top"></iframe>
                    </template>
                    <template if:true={isShowAccount}>
                        <c-epos-account order={order} onaccountcreated={selectNewAccount} oncontactcreated={selectNewContact} onaddresscreated={selectNewAddress} accountid={GetAccountId} contactid={GetContactId}></c-epos-account>
                    </template>
                    
                    
                </div>
                <div class="clone-icon-static" if:true={isOrderHasId}>
                    <template if:true={isRefresh}>
                        <lightning-spinner variant="brand" size="small" alternative-text="Please wait while loading..."></lightning-spinner>  
                    </template>
                    <lightning-button-icon icon-name="utility:refresh"   alternative-text="Refresh Order" title="" class="slds-m-left_xx-small clickableIcon slds-m-right_small" onclick={RefreshOrder} ></lightning-button-icon>
                    <!--<lightning-icon icon-name="utility:refresh" alternative-text="Refresh Order" title="Fetch latest Order data" size="x-small" class="clickableIcon" onclick={RefreshOrder}></lightning-icon>&nbsp;&nbsp;-->
                    <lightning-button-icon icon-name="action:clone" variant="brand" alternative-text="Clone Order" title=""  class="clickableIcon" onclick={openCloneConfirmation}></lightning-button-icon>
                </div>
                <template if:true={isCloneConfirmation}>
                    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-modal="true" aria-describedby="modal-content-id-1">
                        <div class="slds-modal__container">
                            <div class="slds-modal__content slds-p-around_medium tcenter">
                                <p>{labels.Do_you_want_to_clone_this_order}</p>
                                <lightning-icon icon-name="action:clone" alternative-text="Clone_Icon"></lightning-icon>
                            </div>
                            <footer class="slds-modal__footer text-center">
                                <lightning-button label={labels.No} variant="neutral" onclick={closeCloneConfirmation}></lightning-button>
                                <lightning-button variant="brand" label={labels.Yes} onclick={cloneOrder} class="slds-m-left_x-small"></lightning-button>
                            </footer>
                        </div>
                    </section>
                    <div class="slds-backdrop slds-backdrop_open"></div>
                </template>
            </div>    
        </div>
            <!--Order Tabs ends-->
    
        <div class="slds-grid slds-wrap paddinbtm">
            <div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12 slds-p-around_x-small pt-0"> 
                <!--Line Items starts-->
                <div class="card-box" style="min-height:300px;">
                    <!-- {lineitems_Gap}is class for adding a space between orderlineitems and the total fields table-->
                    <table class="slds-table slds-table_bordered slds-m-top_small">
                        <thead>
                            <tr class="slds-text-title--caps">
                                <th>
                                    <div if:true={showAddButton}><lightning-button label={labels.Add} onclick={showAddProductsPage} disabled={isOrderActivated}></lightning-button></div>
                                </th>
                                <th>
                                    <span class="slds-truncate" title={labels.Code}>{labels.Code}</span> 
                                </th>

                                    <span class="slds-truncate" title={labels.product}>{labels.product}</span>

                                <th>

                                <td>
                                    <div class="slds-truncate">
                                        <!-- <lightning-formatted-url value={orderItemToEdit.pbe.Product2.Id} onclick={editURL} label={orderItemToEdit.pbe.Product2.Name} target="_blank"></lightning-formatted-url> -->
                                        <a onclick={editURL} data-index={index}  target="_blank" class="blueActive">
                                            <lightning-formatted-text value={orderItemToEdit.pbe.Product2.Name} ></lightning-formatted-text>
                                        </a>
                                    </div>  
                                </td>
                                <td>
                                    <div>
                                        <lightning-formatted-text value={orderItemToEdit.pbe.Product2.QuantityUnitOfMeasure}></lightning-formatted-text>
                                    </div>
                                </td>
                                <td>
                                    <div>
                                        {orderItemToEdit.stock}                                               
                                    </div>
                                </td>
                                <td>
                                    <div>
                                        <lightning-input type="number" formatter="currency" value={orderItemToEdit.pbe.UnitPrice} step=".0001" oncommit={EditUnitPrice} class={orderItemToEdit.UnitPriceClass} variant="label-hidden" maxlength="6" message-when-too-long="UnitPrice must not be more than 6 Digits."></lightning-input>
                                    </div>
                                </td>
                                <td>
                                    <div>
                                        <lightning-input type="number" value={orderItemToEdit.quantity} oncommit={editQuantity} data-prodid={orderItemToEdit.pbe.Product2.Id} step=".01" variant="label-hidden" class={orderItemToEdit.quantityClass} maxlength="7" message-when-too-long="Quantity must not be more than 5 Digits."></lightning-input>
                                    </div>
                                </td> 
                                <td>
                                    <div>
                                        <lightning-combobox  class='no-input-lable' value={orderItemToEdit.discountPlan} options={orderItemToEdit.CurrentDiscounts} onchange={editDiscPlan}></lightning-combobox>                                                                                                     
                                    </div>
                                </td>
                                <td>
                                    <div class="slds-grid">
                                        <lightning-input type="number" value={orderItemToEdit.discountPercent} oncommit={editDiscount} variant="label-hidden" class={orderItemToEdit.discountClass} step=".01" maxlength="2" message-when-too-long="Discount percentage must not be more than 5 fraction Digits."></lightning-input>
                                        <div class="min-discount">
                                            <div if:true={orderItemToEdit.isPercent}>[{orderItemToEdit.minDiscount}-{orderItemToEdit.maxDiscount}]%</div>
                                            <div if:false={orderItemToEdit.isPercent}>
                                                [<lightning-formatted-number value={orderItemToEdit.minDiscount} format-style="currency" minimum-fraction-digits="0" currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>-<lightning-formatted-number value={orderItemToEdit.maxDiscount} format-style="currency" minimum-fraction-digits="0" currency-code={orderCurrency} currency-display-as="symbol"></lightning-formatted-number>]
                                            </div>
                                        </div>
                                    </div>                                                        
                                </td>
                                <td>
                                    <div>
                                        <lightning-textarea value={orderItemToEdit.pbe.Product2.Description} onblur={editDescription} class='no-input-lable' maxlength="250" message-when-too-long="Description must not be more than 250 characters."></lightning-textarea>
                                    </div> 
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
                <footer class="slds-modal__footer text-center">                    
                    <lightning-button label={labels.Cancel} variant="neutral" onclick={closeEditModal} class="mr-2"></lightning-button>
                    <lightning-button label={labels.Update} variant="brand" onclick={updateOrderItem}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
