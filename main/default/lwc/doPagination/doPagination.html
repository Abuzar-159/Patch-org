<template>
    <lightning-layout>
				  <lightning-layout-item class="slds-p-right_small slds-col slds-size_1-of-1 slds-medium-size_5-of-12 slds-large-size_5-of-12">
							&nbsp;
				</lightning-layout-item>
				
        <lightning-layout-item class="slds-p-right_small">
            <lightning-button label="Previous" icon-name="utility:chevronleft" onclick={previousHandler1} disabled={previousval}></lightning-button>
        </lightning-layout-item>
				<lightning-layout-item>
            <lightning-button label="Next" icon-name="utility:chevronright" icon-position="right" onclick={nextHandler1} disabled={nextval}></lightning-button>
        </lightning-layout-item>
        <!--<lightning-layout-item>
                <lightning-button label="First Page" icon-name="utility:chevronleft" onclick={FirstPageHandler1}></lightning-button>
        </lightning-layout-item>-->
			<lightning-layout-item flexibility="grow"></lightning-layout-item>
        <lightning-layout-item>
						<div class="slds-grid">
								<label for="limitSelect" class="slds-p-right_small slds-p-top--xx-small">Show</label>
								<select class="slds-select slds-text-color_success" name = "optionSelect" onchange={changeHandler} id="limitSelect">
                       <!-- <option value="">Show</option>-->
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select> 
						</div>
            
                
        </lightning-layout-item>   
        <lightning-layout-item class="slds-p-left_small slds-p-top--xx-small">
            Showing {showval} of total {totalRecords}
        </lightning-layout-item> 
       
        <!--<lightning-layout-item>
                <lightning-button label="Last Page" icon-name="utility:chevronright" icon-position="right" onclick={LastPageHandler1}></lightning-button>
            </lightning-layout-item>-->
        
    </lightning-layout>
</template>
