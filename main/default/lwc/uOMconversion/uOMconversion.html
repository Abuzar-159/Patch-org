<template>

		<lightning-card title="UOM Conversions" icon-name="custom:custom14" >
				<div class="slds-grid slds-gutters">
						 <div class="slds-col slds-size_1-of-4">
						<div class=" slds-p-left_medium slds-float_left_medium">
								<!--lightning-input type="search" label="Search" variant="label-hidden" value={searchTerm} onchange={handleSearchChange} placeholder="Enter Name ..."></lightning-input-->
						</div>
						</div>
				</div>
				<template if:true={uomConversions}>
						<template if:true={statusMessage}>
								<div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
										<span class="slds-assistive-text">Error</span>
										<h2>{statusMessage}</h2>
								</div>
						</template>
						<template if:true={newUoM}>
								<!-- Modal/Popup Box -->
								<section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
										<div class="slds-modal__container">
												<!-- Modal/Popup Box LWC header here -->
												<header class="slds-modal__header">
														<button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
																<lightning-icon icon-name="utility:close"
																								alternative-text="close"
																								variant="inverse"
																								size="small" ></lightning-icon>
																<span class="slds-assistive-text">Close</span>
														</button>
														<h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Create New UoM</h2>
												</header>
												<!-- Modal/Popup Box LWC body starts here -->
												<div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
														<div class="slds-grid slds-wrap">
																<div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12">
																		<lightning-input label="Name" value={rec.Label} onchange={handleNameChange} required></lightning-input>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12 slds-p-top_medium slds-p-bottom_small slds-text-align_center">
																		<strong>FROM</strong>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12 slds-p-right_small">
																		<lightning-input label="UoM" value={rec.ERP7__From_UOM__c} onchange={handleFuom} required></lightning-input>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12 ">
																		<lightning-input label="Value" value={rec.ERP7__From_Value__c} onchange={handleFrom} required></lightning-input>
																</div> 
																<div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12 slds-p-top_medium slds-p-bottom_small slds-text-align_center">
																		<strong>TO</strong>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12 slds-p-right_small slds-p-bottom_medium">
																		<lightning-input label="UoM" value={rec.ERP7__To_UOM__c} onchange={handleTuom} required></lightning-input> 
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-1 slds-p-bottom_medium2">
																		<lightning-input label="Value" value={rec.ERP7__To_Value__c} onchange={handleTo} required></lightning-input>
																</div>
														</div>

												</div>
												<!-- Modal/Popup Box LWC footer starts here -->
												<footer class="slds-modal__footer ">
														<div class="slds-align_absolute-center" > 
																<button class="slds-button slds-button_neutral" onclick={closeModal} title="Cancel">Cancel</button>
																<lightning-button 
																									label="Create"
																									variant="brand"
																									onclick={handleSave}
																									></lightning-button>
														</div>

												</footer>
										</div>
								</section>
								<div class="slds-backdrop slds-backdrop_open"></div>
						</template>
						<template if:true={editUoM}>
								<!-- Modal/Popup Box -->
								<section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
										<div class="slds-modal__container">
												<!-- Modal/Popup Box LWC header here -->
												<header class="slds-modal__header">
														<button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
																<lightning-icon icon-name="utility:close"
																								alternative-text="close"
																								variant="inverse"
																								size="small" ></lightning-icon>
																<span class="slds-assistive-text">Close</span>
														</button>
														<h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate">Edit UoM</h2>
												</header>
												<!-- Modal/Popup Box LWC body starts here -->
												<div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">
														<div class="slds-grid slds-wrap">
																<div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12">
																		<lightning-input label="Name" value={editrec.MasterLabel} onchange={handleNameChange} required></lightning-input>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12 slds-p-top_medium slds-p-bottom_small slds-text-align_center">
																		<strong>FROM</strong>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12 slds-p-right_small">
																		<lightning-input label="UoM" value={editrec.ERP7__From_UOM__c} onchange={handleFuom} required></lightning-input>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12 ">
																		<lightning-input label="Value" value={editrec.ERP7__From_Value__c} onchange={handleFrom} required></lightning-input>
																</div> 
																<div class="slds-col slds-size_1-of-1 slds-medium-size_12-of-12 slds-large-size_12-of-12 slds-p-top_medium slds-p-bottom_small slds-text-align_center">
																		<strong>TO</strong>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-12 slds-p-right_small slds-p-bottom_medium">
																		<lightning-input label="UoM" value={editrec.ERP7__To_UOM__c} onchange={handleTouom} required></lightning-input>
																</div>
																<div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 slds-large-size_6-of-1 slds-p-bottom_medium2">
																		<lightning-input label="Value" value={editrec.ERP7__To_Value__c} onchange={handleTo} required></lightning-input>
																</div>
														</div>







												</div>
												<!-- Modal/Popup Box LWC footer starts here -->
												<footer class="slds-modal__footer ">
														<div class="slds-align_absolute-center" > 
																<button class="slds-button slds-button_neutral slds-m-right_small" onclick={closeModal} title="Cancel">Cancel</button>
																<lightning-button 
																									label="Update"
																									variant="brand"
																									onclick={handleeditSave}
																									></lightning-button>
														</div>

												</footer>
										</div>
								</section>
								<div class="slds-backdrop slds-backdrop_open"></div>
						</template>
						<ul>
								<div class="slds-m-around_small">
										<article class="shadow-sm">


												<table class="slds-table slds-table_bordered slds-table_fixed-layout slds-no-row-hover"  >
														<thead>
																<tr class="slds-text-title--caps slds-text-align_left">                              

																		<th class="slds-text-align_left">Name</th>
																		<th class="slds-text-align_left" style="padding:0px;">
																				<table border="1" width="100%" cellpadding="0" cellspacing="0" style="border-color:#c9c9c9;">
																						<tr>
																								<td class="slds-text-align_center" colspan="2" >From</td>
																						</tr>
																						<tr>
																								<td width="50%">UOM</td>
																								<td width="50%">Value</td>
																						</tr>
																				</table>
																		</th>

																		<th class="slds-text-align_left" style="padding:0px;">
																				<table border="1" width="100%" cellpadding="0" cellspacing="0" style="border-color:#c9c9c9;">
																						<tr>
																								<td class="slds-text-align_center" colspan="2" >To</td>
																						</tr>
																						<tr>
																								<td width="50%">UOM</td>
																								<td width="50%">Value</td>
																						</tr>
																				</table>

																		</th>

																		<th width="10%" class="slds-text-align_center" style="border:0px;"><!--class="slds-text-align_left"-->
																				<lightning-button label="New" onclick={handleNewConversion} variant="brand"></lightning-button>
																		</th>                   

																</tr>
														</thead>
														<tbody>


																<template for:each={uomConversions} for:item="conversion" for:index='index'>
																		<tr key={conversion.Id} class="slds-text-align_left">
																				<td class="slds-text-align_left">
																						<div class="slds-truncate">
																								{conversion.MasterLabel}
																						</div>
																				</td>
																				<td class="slds-text-align_left" style="border-left: 1px solid #c9c9c9;  border-right: 1px solid #c9c9c9; padding: 0;">
																						<table border="0" width="100%" cellpadding="0" cellspacing="0">
																								<tr>
																										<td width="50%" style="border: 0px; border-right: 1px solid #c9c9c9;  height: 41px;">
																												<div class="slds-truncate" style="white-space: normal;">
																														{conversion.ERP7__From_UOM__c}
																												</div>
																										</td>
																										<td width="50%" style="border:0px;">
																												<div class="slds-truncate" style="white-space: normal;">
																														{conversion.ERP7__From_Value__c}
																												</div>
																										</td>
																								</tr>

																						</table>
																				</td> 
																				<td class="slds-text-align_left" style="border-left: 1px solid #c9c9c9;  border-right: 1px solid #c9c9c9; padding: 0;">
																						<table border="0" width="100%" cellpadding="0" cellspacing="0">
																								<tr>
																										<td width="50%" style="border: 0px; border-right: 1px solid #c9c9c9;  height: 41px;">
																												<div class="slds-truncate" style="white-space: normal;">
																														{conversion.ERP7__To_UOM__c}
																												</div>
																										</td>
																										<td width="50%" style="border:0px;">
																												<div class="slds-truncate" style="white-space: normal;">
																														{conversion.ERP7__To_Value__c}
																												</div>
																										</td>
																								</tr>
																						</table>

																				</td>

																				<td class="slds-text-align_center">
																						<!--a  href=javascript:void(0) onclick={editRecord}   data-recordid={conversion.Id}  data-recordindex={index}>
										<img src="/resource/ERP7__SCM/SCM/Images/slds_edit.png"  style="cursor:pointer; width:25px;">
									</a -->
																						<lightning-icon
																														icon-name="action:edit"
																														onclick={editRecord}
																														data-recordid={conversion.Id}
																														data-recordindex={index}
																														size="xx-small" style="cursor:pointer;border-radius: 4px;"
																														></lightning-icon> 
																				</td>            
																		</tr>
																</template>                 
														</tbody>
												</table>

										</article>
								</div>
						</ul>
				</template>

				<template if:false={uomConversions}>
						No UOM Conversions found.
				</template>
		</lightning-card>

</template>
