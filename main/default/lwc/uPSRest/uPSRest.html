<template>

																		</div>-->

                            </div>

                                </div>-->

                                        disabled={disableEditBillOptReturnShipment}></lightning-combobox>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-1 slds-small-size_1-of-1 slds-medium-size_1-of-3 slds-p-right_small slds-p-top_small">
                                    <lightning-input type="text" label="Billing Account Number"
                                        value={returnShipment.ERP7__Billing_Account_Number__c}
                                        disabled={disableEditBillOptReturnShipment}></lightning-input>
                                </div>
                                <div
                                    class="slds-col slds-size_1-of-1 slds-small-size_1-of-1 slds-medium-size_1-of-3 slds-p-right_small slds-p-top_small">
                                    <div lwc:if={returnShipment.ERP7__Billing_Contact__c}>
                                        <label>Billing Contact</label>
                                        <c-custom-input-lookup-l-w-c obj-name="Contact"
                                            search-placeholder="Search Contact" icon-name="standard:contact"
                                            is-value-selected={billContactSelected}
                                            selected-value={returnShipment.ERP7__Billing_Contact__c}
                                            selected-name={returnShipment.ERP7__Billing_Contact__r.Name}
                                            hide-remove={disableEditBillOptReturnShipment}></c-custom-input-lookup-l-w-c>
                                    </div>
                                    <div lwc:else>
                                        <lightning-input placeholder="Billing Contact" disabled="true"
                                            label="Billing Contact"></lightning-input>
                                    </div>


                                </div>
                                <div
                                    class="slds-col slds-size_1-of-1 slds-small-size_1-of-1 slds-medium-size_1-of-3 slds-p-right_small slds-p-top_small">
                                    <div lwc:if={returnShipment.ERP7__Billing_Address__c}>
                                        <label>Billing Address</label>
                                        <c-custom-input-lookup-l-w-c obj-name="ERP7__Address__c"
                                            search-placeholder="Search Address" icon-name="standard:address"
                                            is-value-selected={billingAddressSelected}
                                            selected-value={returnShipment.ERP7__Billing_Address__c}
                                            selected-name={returnShipment.ERP7__Billing_Address__r.Name}
                                            hide-remove={disableEditBillOptReturnShipment}></c-custom-input-lookup-l-w-c>
                                    </div>
                                    <div lwc:else>
                                        <lightning-input label="Billing Address" placeholder="Billing Address"
                                            disabled="true"></lightning-input>
                                    </div>

                                </div>

                                <div
                                    class="slds-col slds-size_1-of-1 slds-small-size_1-of-1 slds-medium-size_1-of-3 slds-p-right_small slds-p-top_small">
                                    <lightning-input type="date" label="Shipment Date" value={returnShipmentDate}
                                        onchange={handleShipmentDateChange}></lightning-input>
                                </div>
                            </div>
                            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-m-top_small">
                                <thead>
                                    <tr class="slds-text-title_caps">
                                        <th scope="col">
                                            <div class="slds-truncate" title="Select">Select</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate" title="Available Service Type">Service Type</div>
                                        </th>
                                        <th scope="col">
                                            <div class="slds-truncate" title="Total Charges">Total Charges</div>
                                        </th>
                                        <!--<th>&nbsp;</th>-->
                                    </tr>
                                </thead>
                                <tbody>
                                    <template if:true={rateResponseReturn}>
                                        <template for:each={rateResponseReturn} for:item="service" for:index="index">
                                            <tr key={service.index}>
                                                <td scope="row" data-label="Select">
                                                    <div class="slds-form-element__control slds-truncate fedex-class10">
                                                        <lightning-input type="radio" name="selectedService"
                                                            label={service.code} value={service.service}
                                                            data-index={index} onchange={handleServiceTypeChangeReturn}
                                                            variant="label-hidden"></lightning-input>
                                                    </div>
                                                </td>
                                                <td data-label="Service Type">
                                                    <div class="slds-truncate" title={service.service}>{service.service}
                                                    </div>
                                                </td>
                                                <td data-label="Total Charges">
                                                    <div class="slds-truncate" title={service.totalCharges}>
                                                        {service.totalCharges}
                                                        <span if:true={service.currencycode}>
                                                            &nbsp; {service.currencycode}
                                                        </span>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </template>
                                    <!--<template if:true={fedexServices.Services}>
                                        <template for:each={fedexServices.Services} for:item="service"
                                            for:index="index">
                                            <tr key={service.Service}>
                                                <th scope="row" data-label="Select">
                                                    <div class="slds-form-element__control slds-truncate fedex-class10">
                                                        <lightning-input type="radio" variant="label-hidden"
                                                            name="service" checked={service.Selected}
                                                            onchange={handleReturnServiceTypeChange}
                                                            data-index={index}></lightning-input>
                                                    </div>
                                                </th>
                                                <td data-label="Service Type">
                                                    <div class="slds-truncate" title={service.Service}>{service.Service}
                                                    </div>
                                                </td>
                                                <td data-label="Total Charges">
                                                    <div class="slds-truncate" title={service.totalCharges}>
                                                        {service.totalCharges}</div>
                                                </td>
                                            </tr>
                                        </template>
                                    </template>-->
                                </tbody>
                            </table>
                        </div>

                        <div class="slds-modal__footer">
                            <div class="slds-grid justify-content-centerups">
                                <div lwc:if={ReturnShipTypeUPS}>
                                    <button class="slds-button slds-button_brand"
                                        onclick={handleGenerateReturnShipmentUPS}>Generate Return Shipment</button>
                                </div>
                                <div lwc:else>
                                    <button class="slds-button slds-button_brand "
                                        onclick={handleGenerateReturnShipment}>Generate Return Shipment</button>
                                </div>

                                <button class="slds-button slds-button_neutral slds-m-left_small"
                                    onclick={handleCloseModal}>Cancel</button>
                            </div>
                        </div>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

        </div>

    </div>
</template>
